<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TikZ-Tool - Nguyễn Hiếu</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #0056b3; }
        #result { background: #f4f4f4; padding: 15px; white-space: pre-wrap; border: 1px solid #ccc; margin-top: 20px; border-radius: 4px; font-family: monospace; }
        footer { margin-top: 30px; font-size: 0.9em; color: #666; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>
    <h1>TikZ-Tool - Nguyễn Hiếu</h1>
    <p>Nhập API Key (Lấy tại <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>):</p>
    <input type="password" id="apiKey" placeholder="Nhập API Key của bạn tại đây">
    
    <textarea id="prompt" placeholder="Mô tả chi tiết hình vẽ bạn muốn tạo..."></textarea>
    <button onclick="generateTikz()">Tạo Code TiKz</button>
    <button onclick="copyCode()" style="background: #28a745;">Copy Code</button>
    
    <div id="result">Kết quả sẽ hiển thị ở đây...</div>

    <footer>
        Thiết kế bởi Nguyễn Hiếu. Nếu gặp khó khăn, hãy liên hệ: 0398514851
    </footer>

    <script>
        async function generateTikz() {
            const apiKey = document.getElementById('apiKey').value;
            const prompt = document.getElementById('prompt').value;
            const resultDiv = document.getElementById('result');

            if (!apiKey) { alert("Vui lòng nhập API Key!"); return; }
            resultDiv.innerText = "Đang tạo code, vui lòng chờ...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: {
                            parts: [{ text: "Bạn là chuyên gia TiKz. Hãy luôn sử dụng gói tkz-euclide cho hình học phẳng. Code phải sạch, có chú thích rõ ràng, sử dụng tọa độ hợp lý, và luôn bao gồm đầy đủ cấu trúc tài liệu LaTeX (documentclass, begin document, end document). Nếu người dùng mô tả hình, hãy tự suy luận tọa độ để hình vẽ cân đối nhất." }]
                        },
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                if (data.candidates) {
                    resultDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    resultDiv.innerText = "Lỗi: " + JSON.stringify(data);
                }
            } catch (error) {
                resultDiv.innerText = "Có lỗi xảy ra: " + error.message;
            }
        }

        function copyCode() {
            const text = document.getElementById('result').innerText;
            navigator.clipboard.writeText(text).then(() => alert("Đã copy code!"));
        }
    </script>
</body>
</html>
