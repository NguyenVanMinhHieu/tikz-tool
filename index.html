<!DOCTYPE html>
<html>
<body>
    <input type="password" id="key" placeholder="API Key">
    <textarea id="prompt" placeholder="Mô tả hình vẽ..."></textarea>
    <button onclick="go()">Tạo Code</button>
    <pre id="out"></pre>

    <script>
        async function go() {
            const key = document.getElementById('key').value;
            const prompt = document.getElementById('prompt').value;
            const out = document.getElementById('out');
            
            out.innerText = "Đang gọi API...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Bạn là chuyên gia TiKz. Hãy tạo code LaTeX cho yêu cầu: " + prompt }] }]
                    })
                });
                const data = await response.json();
                out.innerText = JSON.stringify(data, null, 2);
            } catch (e) {
                out.innerText = "Lỗi: " + e.message;
            }
        }
    </script>
</body>
</html>
