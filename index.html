<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TiKz-Tool- Nguyễn Hiếu</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        #result { background: #f4f4f4; padding: 15px; white-space: pre-wrap; border: 1px solid #ccc; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Công cụ tạo Code TiKz</h1>
    <p>Vui lòng nhập API Key của bạn để sử dụng (Lấy tại <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>):</p>
    <input type="password" id="apiKey" placeholder="Nhập API Key của bạn tại đây" style="width: 100%; margin-bottom: 10px; padding: 8px;">
    
    <textarea id="prompt" placeholder="Mô tả hình vẽ bạn muốn tạo..."></textarea>
    <button onclick="generateTikz()">Tạo Code TiKz</button>
    
    <div id="result">Kết quả sẽ hiển thị ở đây...</div>

    <script>
        async function generateTikz() {
            const apiKey = document.getElementById('apiKey').value;
            const prompt = document.getElementById('prompt').value;
            const resultDiv = document.getElementById('result');

            if (!apiKey) { alert("Vui lòng nhập API Key!"); return; }

            resultDiv.innerText = "Đang tạo code, vui lòng chờ...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Bạn là chuyên gia TiKz. Hãy tạo code LaTeX cho yêu cầu sau: " + prompt }] }]
                    })
                });

                const data = await response.json();
                if (data.candidates) {
                    resultDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    resultDiv.innerText = "Lỗi: " + JSON.stringify(data);
                }
            } catch (error) {
                resultDiv.innerText = "Có lỗi xảy ra: " + error.message;
            }
        }
    </script>
</body>
</html>
